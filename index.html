  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      background-color: black;
      color: white;
      padding: 10px;
      margin: 0;
      font-family: 'Roboto Mono', monospace;

    }

      display: inline;
    }
    p.command::before {
      content: 'SamSesh@127.0.0.1:~$ ';
    }
    table {
      width: 100%;
      max-width: 480px;
    }
    td {
      padding: 1px 8px 1px 0;
      vertical-align: top;
    }
    .typed-cursor {
      display: inline-block;
      opacity: 1;
      animation: blink 0.7s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    a {
      text-decoration: none;
      color: #fff;
    }
    a:hover {
      text-decoration: underline;
    }
    a[target="_blank"]::after {

    }

      max-width: 720px;
      width: 100%;
    }

    @media (max-width: 600px) {

        display: inline-block;
        padding: 0 4px 0 0;

      td:nth-child(2)::after {
        content: '';

      }

<body>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N5RY9S7ZZG"></script>
  <script>

  <main class="console" role="terminal" aria-label="SamSesh terminal">
    Welcome to the interactive terminal. Type <strong>help</strong> for available commands.<br /><br />

    SamSesh@127.0.0.1:~$
    <span id="AboutDevTypeText" class="typeing"></span><span id="input-display"></span><span class="typed-cursor" id="cursor">_</span>

    <script>
      var infoContent =
        '<span>' +
        'cat info.txt<br/>' +
        '127.0.0.1<br/>' +
        "there's no place like ♡ нет никакого места как<br/>" +
        'maybe geek<br/><br/>' +
        'SOCIAL MEDIA:<br/>' +
        "<a href='https://instagram.com/samseshtech' target='_blank' rel='noopener noreferrer'>Instagram</a> : samseshtech, " +
        "<a href='https://instagram.com/sam.sesh' target='_blank' rel='noopener noreferrer'>sam.sesh</a><br/>" +
        "<a href='https://youtube.com/@samseshtech' target='_blank' rel='noopener noreferrer'>Youtube</a> : samseshtech<br/>" +
        "<a href='https://twitter.com/_samsesh' target='_blank' rel='noopener noreferrer'>Twitter</a> : _samsesh<br/>" +
        "<a href='https://t.me/sam_sesh' target='_blank' rel='noopener noreferrer'>Telegram</a> : sam_sesh, " +
        "<a href='https://t.me/SamSeshTech' target='_blank' rel='noopener noreferrer'>SamSeshTech</a><br/>" +
        "<a href='https://linkedin.com/in/sam-sesh' target='_blank' rel='noopener noreferrer'>Linkedin</a> : sam-sesh<br/>" +
        "<a href='https://github.com/samsesh' target='_blank' rel='noopener noreferrer'>GitHub</a> : samsesh<br/>" +
        "<a href='mailto:admin@samsesh.net'>E-mail</a> : admin@samsesh.net<br/>" +
        'Phone : +1 (260) 306-5413<br/>' +
        '</span><br/><br/>' +
        "<a href='https://donate.samsesh.net' target='_blank' rel='noopener noreferrer'>DONATE:</a><br/>" +
        "<a href='https://nowpayments.io/donation/samsesh' target='_blank' rel='noopener noreferrer'>Cryptocurrency</a><br/>" +
        "<a href='https://paypal.me/samsesh' target='_blank' rel='noopener noreferrer'>PayPal</a><br/>" +
        "<a href='https://www.patreon.com/SamSesh' target='_blank' rel='noopener noreferrer'>Patreon</a><br/><br/>" +
        '<span>SamSesh@127.0.0.1:~$ </span>';

      var typeEl = document.getElementById('AboutDevTypeText');
      var inputDisplay = document.getElementById('input-display');
      var commandBuffer = '';

      function typeText(text, i) {
        if (i < text.length) {
          typeEl.innerHTML = text.slice(0, i + 1);
          setTimeout(function() { typeText(text, i + 1); }, 15);
        }
      }
      typeText(infoContent, 0);

      function printOutput(html) {
        var p = document.createElement('p');
        p.className = 'command';
        p.innerHTML = html;
        document.querySelector('.console').appendChild(p);
        window.scrollTo(0, document.body.scrollHeight);
      }

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' ||
            e.key === 'Meta' || e.key === 'CapsLock' || e.key === 'Tab' ||
            e.key === 'Escape') {
          return;
        }

        if (e.key === 'Enter') {
          var cmd = commandBuffer.trim().toLowerCase();
          commandBuffer = '';

          if (cmd === 'help') {
            printOutput(
              'Available commands:<br/>' +
              '  <strong>help</strong>     - Show this message<br/>' +
              '  <strong>info</strong>     - Display contact & social info<br/>' +
              '  <strong>social</strong>   - Show social media links<br/>' +
              '  <strong>contact</strong>  - Show email & phone<br/>' +
              '  <strong>donate</strong>   - Open donation page<br/>' +
              '  <strong>telegram</strong> - Open Telegram channel<br/>' +
              '  <strong>clear</strong>    - Clear the terminal'
            );
          } else if (cmd === 'info') {
            typeEl.innerHTML = infoContent;
          } else if (cmd === 'social') {
            printOutput(
              "Instagram : <a href='https://instagram.com/samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a>, " +
              "<a href='https://instagram.com/sam.sesh' target='_blank' rel='noopener noreferrer'>sam.sesh</a><br/>" +
              "Youtube : <a href='https://youtube.com/@samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a><br/>" +
              "Twitter : <a href='https://twitter.com/_samsesh' target='_blank' rel='noopener noreferrer'>_samsesh</a><br/>" +
              "Telegram : <a href='https://t.me/sam_sesh' target='_blank' rel='noopener noreferrer'>sam_sesh</a><br/>" +
              "GitHub : <a href='https://github.com/samsesh' target='_blank' rel='noopener noreferrer'>samsesh</a><br/>" +
              "LinkedIn : <a href='https://linkedin.com/in/sam-sesh' target='_blank' rel='noopener noreferrer'>sam-sesh</a>"
            );
          } else if (cmd === 'contact') {
            printOutput(
              "E-mail : <a href='mailto:admin@samsesh.net'>admin@samsesh.net</a><br/>" +
              'Phone : +1 (260) 306-5413'
            );
          } else if (cmd === 'donate') {
            window.open('https://donate.samsesh.net', '_blank', 'noopener');
            printOutput('Opening donation page...');
          } else if (cmd === 'telegram') {
            window.open('https://t.me/sam_sesh', '_blank', 'noopener');
            printOutput('Opening Telegram channel...');
          } else if (cmd === 'clear') {
            var els = document.querySelectorAll('.console .command');
            for (var i = 0; i < els.length; i++) {
              els[i].remove();
            }
          } else if (cmd !== '') {
            printOutput(
              "Command not found: " + cmd + "<br/>" +
              "Type <strong>help</strong> for available commands."
            );
          }
          return;
        }

        if (e.key === 'Backspace') {
          commandBuffer = commandBuffer.slice(0, -1);
          inputDisplay.textContent = commandBuffer;
          e.preventDefault();
          return;
        }

        if (e.key.length === 1) {
          commandBuffer += e.key;
          inputDisplay.textContent = commandBuffer;
          e.preventDefault();
        }
      });
    </script>
  </main>
