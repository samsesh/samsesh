  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      background-color: black;
      color: white;
      padding: 10px;
      margin: 0;
      font-family: 'Roboto Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    p {
      margin: 0;
    }
    .command-line {
      display: inline;
    }
    p.command::before {
      content: 'SamSesh@127.0.0.1:~$ ';
    }
    table {
      width: 100%;
      max-width: 480px;
    }
    td {
      padding: 1px 8px 1px 0;
      vertical-align: top;
    }
    .typed-cursor {
      display: inline-block;
      opacity: 1;
      animation: blink 0.7s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .dim {
      color: #666;
    }
    .hl {
      color: #fff;
      font-weight: bold;
    }
    .cmd-echo {
      display: inline;
    }
    .output {

    a {

    a:hover {

    a[target="_blank"]::after {
      content: ' \2197';
      font-size: 10px;
    }
    .console {
      max-width: 720px;
      width: 100%;
    }

    @media (max-width: 600px) {
      body {
        font-size: 11px;
        padding: 8px;
        align-items: flex-start;
        padding-top: 10px;
      }
      td {
        display: inline-block;
        padding: 0 4px 0 0;
      }
      td:nth-child(2)::after {
        content: '';
        display: block;
      }
      a[target="_blank"]::after {
        font-size: 9px;
      }
    }

    @media (max-width: 400px) {
      body {
        font-size: 10px;

      }
    }

<body>

  <main class="console" role="terminal" aria-label="SamSesh terminal">
    Ubuntu 22.04 LTS (GNU/Linux 5.15.0-generic x86_64)<br />
    <br />
    * Documentation:  <a href="https://help.ubuntu.com">help.ubuntu.com</a><br />
    * Management:     <a href="https://landscape.canonical.com">landscape.canonical.com</a><br />
    * Support:        <a href="https://ubuntu.com/pro">ubuntu.com/pro</a><br />
    <br />
    0 updates can be applied immediately.<br />
    <br />
    SamSesh@127.0.0.1:~$ <span class="dim">type <span class="hl">help</span> for available commands</span><br />
    <br />
    SamSesh@127.0.0.1:~$
    <span id="AboutDevTypeText" class="typeing"></span><span id="input-display"></span><span class="typed-cursor" id="cursor">_</span>

    <script>
      var infoContent =
        '<span>' +
        'DevSecOps & Cybersecurity Researcher<br/>' +
        '127.0.0.1 — there\'s no place like home<br/><br/>' +
        'SOCIALS<br/>' +
        "<a href='https://instagram.com/samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(instagram)</span><br/>" +
        "<a href='https://instagram.com/sam.sesh' target='_blank' rel='noopener noreferrer'>sam.sesh</a> <span class='dim'>(instagram)</span><br/>" +
        "<a href='https://youtube.com/@samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(youtube)</span><br/>" +
        "<a href='https://twitter.com/_samsesh' target='_blank' rel='noopener noreferrer'>_samsesh</a> <span class='dim'>(twitter)</span><br/>" +
        "<a href='https://t.me/sam_sesh' target='_blank' rel='noopener noreferrer'>sam_sesh</a> <span class='dim'>(telegram)</span><br/>" +
        "<a href='https://t.me/SamSeshTech' target='_blank' rel='noopener noreferrer'>SamSeshTech</a> <span class='dim'>(telegram)</span><br/>" +
        "<a href='https://linkedin.com/in/sam-sesh' target='_blank' rel='noopener noreferrer'>sam-sesh</a> <span class='dim'>(linkedin)</span><br/>" +
        "<a href='https://github.com/samsesh' target='_blank' rel='noopener noreferrer'>samsesh</a> <span class='dim'>(github)</span><br/><br/>" +
        "CONTACT<br/>" +
        "<a href='mailto:admin@samsesh.net'>admin@samsesh.net</a><br/>" +
        '+1 (260) 306-5413<br/><br/>' +
        "DONATE<br/>" +
        "<a href='https://donate.samsesh.net' target='_blank' rel='noopener noreferrer'>donate.samsesh.net</a><br/>" +
        "<a href='https://nowpayments.io/donation/samsesh' target='_blank' rel='noopener noreferrer'>nowpayments.io/donation/samsesh</a><br/>" +
        "<a href='https://paypal.me/samsesh' target='_blank' rel='noopener noreferrer'>paypal.me/samsesh</a><br/>" +
        "<a href='https://www.patreon.com/SamSesh' target='_blank' rel='noopener noreferrer'>patreon.com/SamSesh</a><br/>" +
        '</span>';

      var typeEl = document.getElementById('AboutDevTypeText');
      var inputDisplay = document.getElementById('input-display');
      var commandBuffer = '';
      var typingTimer = null;

      function stopTyping() {
        if (typingTimer) {
          clearTimeout(typingTimer);
          typingTimer = null;
        }
      }

      function typeText(text, i) {
        if (i < text.length) {
          typeEl.innerHTML = text.slice(0, i + 1);
          typingTimer = setTimeout(function() { typeText(text, i + 1); }, 15);
        }
      }
      typeText(infoContent, 0);

      function printLine(html, cls) {
        var p = document.createElement('p');
        p.className = cls || 'output';
        p.innerHTML = html;
        document.querySelector('.console').appendChild(p);
        window.scrollTo(0, document.body.scrollHeight);
      }

      function echoAndExecute(cmd) {
        stopTyping();
        printLine('<span class="cmd-echo">' + cmd + '</span>', 'command');
        inputDisplay.textContent = '';
        commandBuffer = '';

        var parts = cmd.trim().split(/\s+/);
        var c = parts[0].toLowerCase();
        var args = parts.slice(1);
        if (!c || c === 'help') {
          printLine(
            'available commands:<br/>' +
            '  <span class="hl">help</span>       show this message<br/>' +
            '  <span class="hl">info</span>       display all contact info<br/>' +
            '  <span class="hl">social</span>     show social media links<br/>' +
            '  <span class="hl">contact</span>    show email & phone<br/>' +
            '  <span class="hl">donate</span>     show donation options<br/>' +
            '  <span class="hl">telegram</span>   open Telegram channel<br/>' +
            '  <span class="hl">whoami</span>     who you are<br/>' +
            '  <span class="hl">date</span>       current date and time<br/>' +
            '  <span class="hl">uptime</span>     system uptime<br/>' +
            '  <span class="hl">uname</span>      system information<br/>' +
            '  <span class="hl">echo</span>       repeat text<br/>' +
            '  <span class="hl">clear</span>      clear the terminal'
          );
        } else if (c === 'info') {
          typeEl.innerHTML = infoContent;
        } else if (c === 'social') {
          printLine(
            "<a href='https://instagram.com/samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(instagram)</span><br/>" +
            "<a href='https://instagram.com/sam.sesh' target='_blank' rel='noopener noreferrer'>sam.sesh</a> <span class='dim'>(instagram)</span><br/>" +
            "<a href='https://youtube.com/@samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(youtube)</span><br/>" +
            "<a href='https://twitter.com/_samsesh' target='_blank' rel='noopener noreferrer'>_samsesh</a> <span class='dim'>(twitter)</span><br/>" +
            "<a href='https://t.me/sam_sesh' target='_blank' rel='noopener noreferrer'>sam_sesh</a> <span class='dim'>(telegram)</span><br/>" +
            "<a href='https://t.me/SamSeshTech' target='_blank' rel='noopener noreferrer'>SamSeshTech</a> <span class='dim'>(telegram)</span><br/>" +
            "<a href='https://linkedin.com/in/sam-sesh' target='_blank' rel='noopener noreferrer'>sam-sesh</a> <span class='dim'>(linkedin)</span><br/>" +
            "<a href='https://github.com/samsesh' target='_blank' rel='noopener noreferrer'>samsesh</a> <span class='dim'>(github)</span>"
          );
        } else if (c === 'contact') {
          printLine(
            "<a href='mailto:admin@samsesh.net'>admin@samsesh.net</a><br/>" +
            '+1 (260) 306-5413'
          );
        } else if (c === 'donate') {
          printLine(
            '<span class="hl">=== DONATION OPTIONS ===</span><br/>' +
            "<a href='https://donate.samsesh.net' target='_blank' rel='noopener noreferrer'>donate.samsesh.net</a> <span class='dim'>(donation page)</span><br/>" +
            "<a href='https://paypal.me/samsesh' target='_blank' rel='noopener noreferrer'>paypal.me/samsesh</a> <span class='dim'>(paypal)</span><br/>" +
            "<a href='https://nowpayments.io/donation/samsesh' target='_blank' rel='noopener noreferrer'>nowpayments.io/donation/samsesh</a> <span class='dim'>(crypto)</span><br/>" +
            "<a href='https://www.patreon.com/SamSesh' target='_blank' rel='noopener noreferrer'>patreon.com/SamSesh</a> <span class='dim'>(patreon)</span><br/>" +
            '<span class="dim">opening donate.samsesh.net...</span>'
          );
          window.open('https://donate.samsesh.net', '_blank', 'noopener');
        } else if (c === 'telegram') {
          window.open('https://t.me/sam_sesh', '_blank', 'noopener');
          printLine('opening Telegram...');
        } else if (c === 'whoami') {
          printLine('samsesh');
        } else if (c === 'date') {
          printLine(new Date().toString());
        } else if (c === 'uptime') {
          printLine(' 12:34:56 up 127 days,  0:01,  1 user,  load average: 0.00, 0.01, 0.05');
        } else if (c === 'uname') {
          var ua = args.join(' ');
          if (ua === '-a') {
            printLine('Linux 127.0.0.1 5.15.0-generic #1 SMP Ubuntu 22.04 LTS x86_64 GNU/Linux');
          } else {
            printLine('Linux');
          }
        } else if (c === 'echo') {
          printLine(args.join(' '));
        } else if (c === 'clear') {
          var all = document.querySelectorAll('.console .command, .console .output');
          for (var i = 0; i < all.length; i++) {
            all[i].remove();
          }
        } else {
          printLine(
            "bash: " + cmd + ": command not found"
          );
        }
        window.scrollTo(0, document.body.scrollHeight);
      }

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' ||
            e.key === 'Meta' || e.key === 'CapsLock' || e.key === 'Tab' ||
            e.key === 'Escape') {
          return;
        }

        if (e.key === 'Enter') {
          echoAndExecute(inputDisplay.textContent);
          return;
        }

        if (e.key === 'Backspace') {
          commandBuffer = commandBuffer.slice(0, -1);
          inputDisplay.textContent = commandBuffer;
          e.preventDefault();
          return;
        }

        if (e.key.length === 1) {
          commandBuffer += e.key;
          inputDisplay.textContent = commandBuffer;
          e.preventDefault();
        }
      });
    </script>
  </main>
