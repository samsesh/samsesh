  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      background-color: #0a0a0a;
      color: #e0e0e0;
      padding: 12px;
      margin: 0;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }
    p {
      margin: 0;
    }
    .line {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .prompt-line {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .prompt-line::before {
      content: 'samsesh@127.0.0.1:~$ ';
      color: #00ff00;
    }
    .prompt {
      color: #00ff00;
    }
    .cursor-blink {
      display: inline-block;
      opacity: 1;
      animation: blink 0.7s infinite;
      color: #00ff00;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    a {
      text-decoration: none;
      color: #00aaff;
    }
    a:hover {
      text-decoration: underline;
    }
    a[target="_blank"]::after {
      content: ' \2197';
      font-size: 11px;
    }
    .console {
      max-width: 800px;
      width: 100%;
    }
    .highlight {
      color: #00ff00;
    }
    .dim {
      color: #666;
    }
    .error {
      color: #ff4444;
    }
    .files {
      color: #00aaff;
    }
    .ascii {
      color: #00ff00;
      white-space: pre;
      line-height: 1.2;
    }

    @media (max-width: 600px) {
      body {
        font-size: 11px;
        padding: 8px;
      }
      a[target="_blank"]::after {
        font-size: 9px;
      }
    }

    @media (max-width: 400px) {
      body {
        font-size: 10px;
        padding: 5px;
      }
    }
  </style>
</head>
<body>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N5RY9S7ZZG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-N5RY9S7ZZG');
  </script>

  <main class="console" role="terminal" aria-label="SamSesh terminal">
    <div id="output"></div>
    <div class="prompt-line" id="current-line">
      <span id="input-display"></span><span class="cursor-blink" id="cursor">|</span>
    </div>

    <script>
      var outputEl = document.getElementById('output');
      var inputDisplay = document.getElementById('input-display');
      var cursorEl = document.getElementById('cursor');
      var commandBuffer = '';

      var history = [];
      var historyIndex = -1;

      var files = [
        { name: 'about.txt',  desc: 'about samsesh' },
        { name: 'contact.txt', desc: 'email and phone' },
        { name: 'social.txt', desc: 'social media links' },
        { name: 'donate.txt', desc: 'donation options' }
      ];

      var bootLines = [
        'Ubuntu 22.04 LTS (GNU/Linux 5.15.0-generic x86_64)',
        '',
        ' * Documentation: https://help.ubuntu.com',
        ' * Management:    https://landscape.canonical.com',
        ' * Support:       https://ubuntu.com/pro',
        '',
        '0 updates can be applied immediately.',
        '',
        'samsesh@127.0.0.1:~$ <span class="dim">type <span class="highlight">help</span> for available commands</span>',
        ''
      ];

      function printLine(html, className) {
        var d = document.createElement('div');
        d.className = className || 'line';
        d.innerHTML = html;
        outputEl.appendChild(d);
      }

      function boot() {
        for (var i = 0; i < bootLines.length; i++) {
          printLine(bootLines[i]);
        }
        window.scrollTo(0, document.body.scrollHeight);
      }
      boot();

      function printPrompt(cmd) {
        var d = document.createElement('div');
        d.className = 'prompt-line';
        d.innerHTML = '<span class="prompt">samsesh@127.0.0.1:~$ </span>' + cmd;
        outputEl.appendChild(d);
      }

      function handleCommand(cmd) {
        var parts = cmd.trim().split(/\s+/);
        var command = parts[0];
        var args = parts.slice(1);

        if (command === '') return;

        history.push(cmd);
        historyIndex = -1;

        printPrompt(cmd);

        switch (command) {
          case 'help':
            printLine('available commands:');
            printLine('  <span class="highlight">help</span>       show this message');
            printLine('  <span class="highlight">ls</span>         list files');
            printLine('  <span class="highlight">cat</span>        display file (e.g. <span class="highlight">cat about.txt</span>)');
            printLine('  <span class="highlight">whoami</span>     who you are');
            printLine('  <span class="highlight">date</span>       current date and time');
            printLine('  <span class="highlight">uptime</span>     system uptime');
            printLine('  <span class="highlight">uname</span>      system information');
            printLine('  <span class="highlight">neofetch</span>   show system info');
            printLine('  <span class="highlight">echo</span>       repeat text');
            printLine('  <span class="highlight">clear</span>      clear terminal');
            break;

          case 'ls':
            if (args.length > 0) {
              printLine('ls: cannot access \'' + args.join(' ') + '\': No such file or directory', 'error');
            } else {
              for (var i = 0; i < files.length; i++) {
                printLine('<span class="files">' + files[i].name + '</span>  ' + files[i].desc);
              }
            }
            break;

          case 'cat':
            if (args.length === 0) {
              printLine('cat: missing operand', 'error');
            } else {
              var filename = args.join(' ');
              if (filename === 'about.txt') {
                printLine('127.0.0.1');
                printLine('there\'s no place like home');
                printLine('maybe geek');
                printLine('');
                printLine('samsesh@127.0.0.1:~$ <span class="dim">try <span class="highlight">cat social.txt</span></span>');
              } else if (filename === 'social.txt') {
                printLine("<a href='https://instagram.com/samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a>  <span class='dim'>(instagram)</span>");
                printLine("<a href='https://instagram.com/sam.sesh' target='_blank' rel='noopener noreferrer'>sam.sesh</a>     <span class='dim'>(instagram)</span>");
                printLine("<a href='https://youtube.com/@samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a>  <span class='dim'>(youtube)</span>");
                printLine("<a href='https://twitter.com/_samsesh' target='_blank' rel='noopener noreferrer'>_samsesh</a>     <span class='dim'>(twitter)</span>");
                printLine("<a href='https://t.me/sam_sesh' target='_blank' rel='noopener noreferrer'>sam_sesh</a>     <span class='dim'>(telegram)</span>");
                printLine("<a href='https://t.me/SamSeshTech' target='_blank' rel='noopener noreferrer'>SamSeshTech</a> <span class='dim'>(telegram)</span>");
                printLine("<a href='https://linkedin.com/in/sam-sesh' target='_blank' rel='noopener noreferrer'>sam-sesh</a>    <span class='dim'>(linkedin)</span>");
                printLine("<a href='https://github.com/samsesh' target='_blank' rel='noopener noreferrer'>samsesh</a>     <span class='dim'>(github)</span>");
              } else if (filename === 'contact.txt') {
                printLine("email: <a href='mailto:admin@samsesh.net'>admin@samsesh.net</a>");
                printLine('phone: +1 (260) 306-5413');
              } else if (filename === 'donate.txt') {
                printLine("<a href='https://donate.samsesh.net' target='_blank' rel='noopener noreferrer'>donate.samsesh.net</a>  <span class='dim'>(donation page)</span>");
                printLine("<a href='https://paypal.me/samsesh' target='_blank' rel='noopener noreferrer'>paypal.me/samsesh</a>  <span class='dim'>(paypal)</span>");
                printLine("<a href='https://nowpayments.io/donation/samsesh' target='_blank' rel='noopener noreferrer'>nowpayments.io/donation/samsesh</a>  <span class='dim'>(crypto)</span>");
                printLine("<a href='https://www.patreon.com/SamSesh' target='_blank' rel='noopener noreferrer'>patreon.com/SamSesh</a>  <span class='dim'>(patreon)</span>");
              } else {
                printLine('cat: ' + filename + ': No such file or directory', 'error');
              }
            }
            break;

          case 'whoami':
            printLine('samsesh');
            break;

          case 'date':
            printLine(new Date().toString());
            break;

          case 'uptime':
            printLine(' 12:34:56 up 127 days,  0:01,  1 user,  load average: 0.00, 0.01, 0.05');
            break;

          case 'uname':
            if (args.join(' ') === '-a') {
              printLine('Linux 127.0.0.1 5.15.0-generic #1 SMP Ubuntu 22.04 LTS x86_64 GNU/Linux');
            } else {
              printLine('Linux');
            }
            break;

          case 'neofetch':
            printLine('<span class="ascii">       _.---._    </span><span class="highlight">samsesh@127.0.0.1</span>');
            printLine('<span class="ascii">   .\'"       "\'.  </span><span class="dim">OS:</span> Ubuntu 22.04 LTS x86_64');
            printLine('<span class="ascii">  /  \\  \\   /  /  </span><span class="dim">Host:</span> 127.0.0.1');
            printLine('<span class="ascii"> /   |  |   |   \\ </span><span class="dim">Kernel:</span> 5.15.0-generic');
            printLine('<span class="ascii">/    |__|   |    \\</span><span class="dim">Uptime:</span> 127 days');
            printLine('<span class="ascii">|   /  \\   /    |</span><span class="dim">Shell:</span> bash 5.1.16');
            printLine('<span class="ascii">|  /    \\ /     |</span><span class="dim">Terminal:</span> /dev/pts/0');
            printLine('<span class="ascii"> \\/\\    /\\/\\/\\/</span>');
            break;

          case 'echo':
            printLine(args.join(' '));
            break;

          case 'clear':
            outputEl.innerHTML = '';
            break;

          case 'pwd':
            printLine('/home/samsesh');
            break;

          case 'cd':
            if (args.length === 0) {
              printLine('samsesh@127.0.0.1:~$');
            } else {
              printLine('bash: cd: ' + args.join(' ') + ': No such file or directory', 'error');
            }
            break;

          case 'sudo':
            printLine('samsesh is not in the sudoers file.  This incident will be reported.', 'error');
            break;

          case 'whois':
            if (args.join(' ') === 'samsesh') {
              printLine('127.0.0.1');
              printLine('there\'s no place like home');
              printLine('maybe geek');
            } else {
              printLine('whois: ' + args.join(' ') + ': no entries found', 'error');
            }
            break;

          default:
            printLine('bash: ' + command + ': command not found', 'error');
        }

        window.scrollTo(0, document.body.scrollHeight);
      }

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' ||
            e.key === 'Meta' || e.key === 'CapsLock' || e.key === 'Escape') {
          return;
        }

        if (e.key === 'Enter') {
          var cmd = commandBuffer;
          commandBuffer = '';
          inputDisplay.textContent = '';
          handleCommand(cmd);
          return;
        }

        if (e.key === 'Backspace') {
          commandBuffer = commandBuffer.slice(0, -1);
          inputDisplay.textContent = commandBuffer;
          e.preventDefault();
          return;
        }

        if (e.key === 'ArrowUp') {
          if (history.length > 0) {
            if (historyIndex === -1) {
              historyIndex = history.length - 1;
            } else if (historyIndex > 0) {
              historyIndex--;
            }
            commandBuffer = history[historyIndex];
            inputDisplay.textContent = commandBuffer;
          }
          e.preventDefault();
          return;
        }

        if (e.key === 'ArrowDown') {
          if (history.length > 0 && historyIndex !== -1) {
            if (historyIndex < history.length - 1) {
              historyIndex++;
              commandBuffer = history[historyIndex];
            } else {
              historyIndex = -1;
              commandBuffer = '';
            }
            inputDisplay.textContent = commandBuffer;
          }
          e.preventDefault();
          return;
        }

        if (e.key.length === 1) {
          commandBuffer += e.key;
          inputDisplay.textContent = commandBuffer;
          e.preventDefault();
        }
      });
    </script>
  </main>
</body>
