  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      background-color: #0d1117;
      color: #e6edf3;
      padding: 14px;
      margin: 0;

      min-height: 100vh;
    }
    p {
      margin: 0;
    }
    .console {
      max-width: 800px;
      width: 100%;
    }
    .prompt {
      color: #00ff00;
    }
    .prompt-line::before {
      content: 'samsesh@127.0.0.1:~$ ';
      color: #00ff00;
    }
    .cursor {
      display: inline-block;
      animation: blink 0.7s infinite;
      color: #00ff00;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    a {
      text-decoration: none;
      color: #58a6ff;
    }
    a:hover {

    }
    a[target="_blank"]::after {
      content: ' \2197';

    }
    .dim {
      color: #8b949e;
    }
    .hl {
      color: #00ff00;
      font-weight: bold;
    }
    .header {
      color: #00ff00;
      font-weight: bold;
    }
    .error {
      color: #f85149;
    }

    @media (max-width: 600px) {
      body {
        font-size: 11px;
        padding: 8px;
      }
      a[target="_blank"]::after {
        font-size: 9px;
      }
    }
    @media (max-width: 400px) {

<body>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N5RY9S7ZZG"></script>
  <script>

    gtag('js', new Date());
    gtag('config', 'G-N5RY9S7ZZG');

  <main class="console" role="terminal" aria-label="SamSesh terminal">
    <div id="output"></div>
    <div class="prompt-line">
      <input type="text" id="input-field" autofocus spellcheck="false" autocomplete="off" />
      <span class="cursor">|</span>
    </div>

    <script>
      var outputEl = document.getElementById('output');
      var inputField = document.getElementById('input-field');
      var history = [];
      var historyIndex = -1;
      var typingTimer = null;

      var bootMsg = [
        'Ubuntu 22.04 LTS (GNU/Linux 5.15.0-generic x86_64)',
        '',
        ' * Documentation:  https://help.ubuntu.com',
        ' * Management:     https://landscape.canonical.com',
        ' * Support:        https://ubuntu.com/pro',
        '',
        '0 updates can be applied immediately.',
        '',
        '<span class="dim">type <span class="hl">help</span> for available commands</span>',
        ''
      ];

      var infoContent =
        'DevSecOps & Cybersecurity Researcher<br/>' +
        "127.0.0.1 — there's no place like home<br/><br/>" +
        '<span class="header">SOCIALS</span><br/>' +
        "<a href='https://instagram.com/samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(instagram)</span><br/>" +
        "<a href='https://instagram.com/sam.sesh' target='_blank' rel='noopener noreferrer'>sam.sesh</a> <span class='dim'>(instagram)</span><br/>" +
        "<a href='https://youtube.com/@samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(youtube)</span><br/>" +
        "<a href='https://twitter.com/_samsesh' target='_blank' rel='noopener noreferrer'>_samsesh</a> <span class='dim'>(twitter)</span><br/>" +
        "<a href='https://t.me/sam_sesh' target='_blank' rel='noopener noreferrer'>sam_sesh</a> <span class='dim'>(telegram)</span><br/>" +
        "<a href='https://t.me/SamSeshTech' target='_blank' rel='noopener noreferrer'>SamSeshTech</a> <span class='dim'>(telegram)</span><br/>" +
        "<a href='https://linkedin.com/in/sam-sesh' target='_blank' rel='noopener noreferrer'>sam-sesh</a> <span class='dim'>(linkedin)</span><br/>" +
        "<a href='https://github.com/samsesh' target='_blank' rel='noopener noreferrer'>samsesh</a> <span class='dim'>(github)</span><br/><br/>" +
        '<span class="header">CONTACT</span><br/>' +
        "<a href='mailto:admin@samsesh.net'>admin@samsesh.net</a><br/>" +
        '+1 (260) 306-5413<br/><br/>' +
        '<span class="header">DONATE</span><br/>' +
        "<a href='https://donate.samsesh.net' target='_blank' rel='noopener noreferrer'>donate.samsesh.net</a><br/>" +
        "<a href='https://nowpayments.io/donation/samsesh' target='_blank' rel='noopener noreferrer'>nowpayments.io/donation/samsesh</a><br/>" +
        "<a href='https://paypal.me/samsesh' target='_blank' rel='noopener noreferrer'>paypal.me/samsesh</a><br/>" +
        "<a href='https://www.patreon.com/SamSesh' target='_blank' rel='noopener noreferrer'>patreon.com/SamSesh</a>";

      function print(s, cls) {
        var d = document.createElement('div');
        d.className = cls || '';
        d.innerHTML = s;
        outputEl.appendChild(d);
      }

      function boot() {
        for (var i = 0; i < bootMsg.length; i++) {
          print(bootMsg[i]);
        }
        window.scrollTo(0, document.body.scrollHeight);
      }
      boot();

      function exec(cmd) {
        var c = cmd.trim();
        if (!c) return;

        history.push(c);
        historyIndex = -1;

        print('<span class="prompt">samsesh@127.0.0.1:~$ </span>' + escapeHtml(c));

        var parts = c.split(/\s+/);
        var command = parts[0].toLowerCase();
        var args = parts.slice(1);

        switch (command) {
          case 'help':
            print('available commands:');
            print('  <span class="hl">help</span>       show this message');
            print('  <span class="hl">info</span>       display all contact info');
            print('  <span class="hl">social</span>     show social media links');
            print('  <span class="hl">contact</span>    show email & phone');
            print('  <span class="hl">donate</span>     show donation options');
            print('  <span class="hl">telegram</span>   open Telegram channel');
            print('  <span class="hl">whoami</span>     who you are');
            print('  <span class="hl">date</span>       current date and time');
            print('  <span class="hl">uptime</span>     system uptime');
            print('  <span class="hl">uname</span>      system information');
            print('  <span class="hl">echo</span>       repeat text');
            print('  <span class="hl">clear</span>      clear the terminal');
            break;

          case 'info':
            print(infoContent);
            break;

          case 'social':
            print("<a href='https://instagram.com/samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(instagram)</span>");
            print("<a href='https://instagram.com/sam.sesh' target='_blank' rel='noopener noreferrer'>sam.sesh</a> <span class='dim'>(instagram)</span>");
            print("<a href='https://youtube.com/@samseshtech' target='_blank' rel='noopener noreferrer'>samseshtech</a> <span class='dim'>(youtube)</span>");
            print("<a href='https://twitter.com/_samsesh' target='_blank' rel='noopener noreferrer'>_samsesh</a> <span class='dim'>(twitter)</span>");
            print("<a href='https://t.me/sam_sesh' target='_blank' rel='noopener noreferrer'>sam_sesh</a> <span class='dim'>(telegram)</span>");
            print("<a href='https://t.me/SamSeshTech' target='_blank' rel='noopener noreferrer'>SamSeshTech</a> <span class='dim'>(telegram)</span>");
            print("<a href='https://linkedin.com/in/sam-sesh' target='_blank' rel='noopener noreferrer'>sam-sesh</a> <span class='dim'>(linkedin)</span>");
            print("<a href='https://github.com/samsesh' target='_blank' rel='noopener noreferrer'>samsesh</a> <span class='dim'>(github)</span>");
            break;

          case 'contact':
            print("<a href='mailto:admin@samsesh.net'>admin@samsesh.net</a>");
            print('+1 (260) 306-5413');
            break;

          case 'donate':
            print('<span class="header">=== DONATION OPTIONS ===</span>');
            print('');
            print("<a href='https://donate.samsesh.net' target='_blank' rel='noopener noreferrer'>donate.samsesh.net</a>  <span class='dim'>donation page</span>");
            print("<a href='https://paypal.me/samsesh' target='_blank' rel='noopener noreferrer'>paypal.me/samsesh</a>  <span class='dim'>paypal</span>");
            print("<a href='https://nowpayments.io/donation/samsesh' target='_blank' rel='noopener noreferrer'>nowpayments.io/donation/samsesh</a>  <span class='dim'>crypto</span>");
            print("<a href='https://www.patreon.com/SamSesh' target='_blank' rel='noopener noreferrer'>patreon.com/SamSesh</a>  <span class='dim'>patreon</span>");
            print('');
            print('<span class="dim">opening donate.samsesh.net...</span>');
            window.open('https://donate.samsesh.net', '_blank', 'noopener');
            break;

          case 'telegram':
            print('<span class="dim">opening Telegram...</span>');
            window.open('https://t.me/sam_sesh', '_blank', 'noopener');
            break;

          case 'whoami':
            print('samsesh');
            break;

          case 'date':
            print(new Date().toString());
            break;

          case 'uptime':
            print(' 12:34:56 up 127 days,  0:01,  1 user,  load average: 0.00, 0.01, 0.05');
            break;

          case 'uname':
            if (args.join(' ') === '-a') {
              print('Linux 127.0.0.1 5.15.0-generic #1 SMP Ubuntu 22.04 LTS x86_64 GNU/Linux');
            } else {
              print('Linux');
            }
            break;

          case 'echo':
            print(args.join(' '));
            break;

          case 'clear':
            outputEl.innerHTML = '';
            break;

          case 'pwd':
            print('/home/samsesh');
            break;

          case 'ls':
            print('<span class="hl">about.txt</span>    <span class="dim">about samsesh</span>');
            print('<span class="hl">social.txt</span>   <span class="dim">social media links</span>');
            print('<span class="hl">contact.txt</span>  <span class="dim">email and phone</span>');
            print('<span class="hl">donate.txt</span>   <span class="dim">donation options</span>');
            break;

          case 'cd':
            if (args.length === 0) {
              /* stay in home */
            } else {
              print('bash: cd: ' + args.join(' ') + ': No such file or directory', 'error');
            }
            break;

          case 'sudo':
            print('samsesh is not in the sudoers file.  This incident will be reported.', 'error');
            break;

          default:
            print('bash: ' + command + ': command not found', 'error');
        }

        window.scrollTo(0, document.body.scrollHeight);
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      inputField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          exec(inputField.value);
          inputField.value = '';
          return;
        }
        if (e.key === 'ArrowUp') {
          if (history.length > 0) {
            if (historyIndex === -1) {
              historyIndex = history.length - 1;
            } else if (historyIndex > 0) {
              historyIndex--;
            }
            inputField.value = history[historyIndex];
          }
          e.preventDefault();
          return;
        }
        if (e.key === 'ArrowDown') {
          if (history.length > 0 && historyIndex !== -1) {
            if (historyIndex < history.length - 1) {
              historyIndex++;
              inputField.value = history[historyIndex];
            } else {
              historyIndex = -1;
              inputField.value = '';
            }
          }
          e.preventDefault();
          return;
        }
      });

      document.addEventListener('click', function() {
        inputField.focus();
      });
    </script>
